<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTC TIERS</title>
    <link rel="stylesheet" href="css.css?v=500">
</head>
<body>

<header style="text-align:center; margin-bottom:40px;">
    <h1 style="font-size:3rem; text-shadow: 0 0 20px var(--purple);">MTC TIERS</h1>
</header>

<nav style="display:flex; justify-content:center; gap:30px; margin-bottom:40px;">
    <div class="nav-link active" onclick="switchTab('rankings')">RANKINGS</div>
    <div class="nav-link" onclick="switchTab('hof')">HALL OF FAME</div>
    <div class="nav-link" onclick="switchTab('testers')">TIER TESTERS</div>
</nav>

<div id="kitBar" style="display:flex; justify-content:center; gap:10px; margin-bottom:30px; flex-wrap:wrap;"></div>
<div id="viewLabel" style="text-align:center; color:var(--gold); margin-bottom:30px; font-size: 1.2rem;">OVERALL</div>

<div id="displayList"></div>

<div id="profileModal" class="modal-overlay" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="pRank" style="color:var(--purple);">RANK #--</div>
        <h2 id="pName" style="font-size: 2.5rem; margin: 10px 0;">Player</h2>
        <div id="pMeta"></div>
        <div id="pPoints" style="color:var(--gold); font-size:1.5rem; margin: 15px 0;">0 PTS</div>
        <div id="pTiers" style="display:flex; flex-wrap:wrap; justify-content:center; border-top: 1px solid #222; padding-top:20px;"></div>
    </div>
</div>

<script>
const DATA_PATH = "data/";
const ASSETS = "assets/";
const KIT_MAP = { "Overall": "", "Emerald": "emerald.png", "Emerald KB": "emerald_kb.png", "Emerald OA": "emerald_oa.png", "Dragonhide KB": "dragonhide_kb.png", "Dragonhide KB OA": "kb_oa.png", "Wand": "wand.png", "Diamond": "diamond.png" };
const REGIONS = { "NA": "North America", "EU": "Europe", "RS": "Russia", "OC": "Oceania", "AF": "Africa", "SA": "South America", "AS": "Asia" };
const DEVICES = { "MK": "Mouse & Keyboard", "TP": "Touchpad", "MB": "Mobile", "CT": "Controller" };

let DATA = { Kits: {}, Players: [], Overall: {} };

async function load() {
    try {
        const r = await fetch(`${DATA_PATH}rankings.json?v=${Date.now()}`).then(res => res.json());
        DATA.Players = r.Players || [];
        DATA.Kits = { ...r };
        delete DATA.Kits.Players;
        calculateOverall();
        buildKitBar();
        render("Overall");
    } catch(e) { console.error(e); }
}

function calculateOverall() {
    let totals = {};
    const PTS = { "HT1":50, "LT1":40, "HT2":30, "LT2":20, "HT3":12, "LT3":8, "HT4":5, "LT4":3, "HT5":2, "LT5":1 };
    for(let k in DATA.Kits) {
        for(let t in DATA.Kits[k]) {
            const clean = t.replace('R','');
            DATA.Kits[k][t].forEach(name => { totals[name] = (totals[name] || 0) + (PTS[clean] || 0); });
        }
    }
    DATA.Overall = totals;
}

function getTags(name, centered = false) {
    const p = DATA.Players.find(x => x.name === name);
    if(!p) return "";
    return `<div style="display:flex; gap:5px; ${centered ? 'justify-content:center' : ''}">
        <span class="tag" style="background:#3b82f6" data-title="${REGIONS[p.region]||p.region}">${p.region}</span>
        <span class="tag" style="background:#6b7280" data-title="${DEVICES[p.device]||p.device}">${p.device}</span>
    </div>`;
}

function render(kit) {
    const out = document.getElementById('displayList');
    out.innerHTML = "";
    document.getElementById('viewLabel').innerText = kit.toUpperCase();
    
    document.querySelectorAll('.kit-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-kit') === kit));

    if(kit === "Overall") {
        const sorted = Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]);
        sorted.forEach(([name, pts], i) => {
            out.innerHTML += `<div class="tier-card clickable" style="width:100%; max-width:800px; display:flex; justify-content:space-between; align-items:center;" onclick="openProfile('${name}')">
                <div><b style="color:var(--purple)">#${i+1}</b> ${name} ${getTags(name)}</div>
                <b style="color:var(--gold)">${pts} PTS</b>
            </div>`;
        });
    } else {
        const kitData = DATA.Kits[kit];
        ["T1","T2","T3","T4","T5"].forEach(lvl => {
            let col = `<div class="tier-column"><div style="color:var(--purple); text-align:center; border-bottom:1px solid #222; padding-bottom:10px; margin-bottom:10px;">${lvl}</div>`;
            let has = false;
            for(let t in kitData) {
                if(t.includes(lvl)) {
                    kitData[t].forEach(name => {
                        has = true;
                        col += `<div class="tier-card clickable" onclick="openProfile('${name}')">
                            <div style="font-weight:bold">${name}</div>${getTags(name, true)}
                            <div style="color:var(--gold); font-size:0.7rem; margin-top:5px;">${t}</div>
                        </div>`;
                    });
                }
            }
            if(has) { col += "</div>"; out.innerHTML += col; }
        });
    }
}

function openProfile(name) {
    const sorted = Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]);
    document.getElementById('pRank').innerText = "RANK #" + (sorted.findIndex(x => x[0] === name) + 1);
    document.getElementById('pName').innerText = name;
    document.getElementById('pMeta').innerHTML = getTags(name, true);
    document.getElementById('pPoints').innerText = DATA.Overall[name] + " PTS";
    
    let grid = "";
    for(let k in DATA.Kits) {
        for(let t in DATA.Kits[k]) {
            if(DATA.Kits[k][t].includes(name)) {
                const ct = t.replace('R','');
                grid += `
                <div class="p-kit-item">
                    <div class="kit-popup">${k}</div>
                    <div class="p-kit-circle"><img src="${ASSETS}${KIT_MAP[k]}" style="width:40px;"></div>
                    <div style="color:var(--gold); font-size:0.8rem;">${ct}</div>
                </div>`;
            }
        }
    }
    document.getElementById('pTiers').innerHTML = grid;
    document.getElementById('profileModal').style.display = 'flex';
}

function buildKitBar() {
    const bar = document.getElementById('kitBar');
    Object.keys(KIT_MAP).forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'kit-btn';
        btn.setAttribute('data-kit', k);
        btn.innerHTML = (KIT_MAP[k] ? `<img src="${ASSETS}${KIT_MAP[k]}" style="width:16px; vertical-align:middle; margin-right:5px;">` : "") + k.toUpperCase();
        btn.onclick = () => render(k);
        bar.appendChild(btn);
    });
}

window.onload = load;
</script>
</body>
</html>
