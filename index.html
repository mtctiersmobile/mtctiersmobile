<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTC TIERS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/mtctiers/mtctiers.github.io@main/css.css?v=125">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/assets/backgroundsword.png">

    <style>
        /* --- LIST ALIGNMENT (NEW LINE FOR TAGS) --- */
        .player-row-content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }
        .tag-group {
            display: flex;
            gap: 6px;
            justify-content: center; /* Centers tags in modal */
            width: 100%;
        }

        /* --- MODAL BOX TIGHTENING --- */
        .modal-content {
            max-width: 400px !important; /* Prevents the box from being too big */
            padding: 20px !important;
        }

        /* --- HOVER EFFECT (IMAGE MATCH) --- */
        .p-kit-item {
            position: relative;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            width: 70px;
            margin-top: 20px;
        }

        .kit-popup {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid var(--gold);
            padding: 8px 12px;
            border-radius: 4px;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); /* Glow */
            z-index: 10;
            white-space: nowrap;
        }

        .p-kit-item:hover .kit-popup {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* 2-Line Hover Text */
        .popup-kit-name { color: #aaaaaa; font-size: 0.6rem; display: block; margin-bottom: 2px; }
        .popup-tier-name { color: var(--gold); font-size: 0.8rem; font-weight: bold; display: block; }

        .p-kit-circle {
            width: 50px;
            height: 50px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            margin-bottom: 5px;
        }
        .p-kit-circle img { width: 28px; }

        .tier-label-under { font-size: 0.65rem; color: var(--gold); font-weight: bold; }

    </style>
</head>
<body>
<div class="sweep-bg"></div>
<header><img src="https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/assets/backgroundsword.png" class="title-sword"><h1 class="main-title">MTC TIERS</h1></header>

<nav>
    <div class="nav-center">
        <div id="nav-rankings" class="nav-link active" onclick="switchTab('rankings')">RANKINGS</div>
        <div id="nav-hof" class="nav-link" onclick="switchTab('hof')">HALL OF FAME</div>
        <div id="nav-testers" class="nav-link" onclick="switchTab('testers')">TIER TESTERS</div>
    </div>
    <div class="search-wrap">
        <input type="text" id="playerSearch" placeholder="SEARCH PLAYER..." oninput="handleSearch(this.value)">
        <div id="searchPopup"></div>
    </div>
</nav>

<div id="viewLabel" style="font-family:'MultiCraftFont'; font-size:1.2rem; color:var(--gold); margin:25px 0;">OVERALL</div>
<div id="kitBar"></div>
<div id="displayList"></div>

<div id="profileModal" class="modal-overlay" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="pRank" style="font-family:'MultiCraftFont'; color:var(--purple); font-size:0.7rem;">RANK #--</div>
        <h2 id="pName" style="font-family:'MultiCraftFont'; color:#fff; margin:10px 0; font-size: 1.8rem;">Player</h2>
        <div id="pMeta" class="tag-group" style="margin-bottom: 15px;"></div>
        <div id="pPoints" style="color:var(--gold); font-family:'MultiCraftFont'; font-size:1.4rem; margin-bottom:20px;">0 PTS</div>
        <div id="pTiers" style="display:flex; flex-wrap:wrap; justify-content:center; gap:12px; border-top:1px solid #333; padding-top:15px;"></div>
    </div>
</div>

<script>
const ASSETS = "https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/assets/";
const DATA_PATH = "https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/data/";
const KIT_MAP = { "Overall": "", "Emerald": "emerald.png", "Emerald KB": "emerald_kb.png", "Emerald OA": "emerald_oa.png", "Dragonhide KB": "dragonhide_kb.png", "Dragonhide KB OA": "kb_oa.png", "Wand": "wand.png", "Diamond": "diamond.png" };

let DATA = {};
let CURRENT_TAB = 'rankings';
let CURRENT_KIT = 'Overall';

function getTags(name, centered = false) {
    const p = DATA.Players?.find(x => x.name === name) || {region:"NA", device:"MK"};
    return `<div class="tag-group" style="${centered ? 'justify-content:center;' : 'justify-content:flex-start;'}">
        <span class="tag reg-${p.region.toLowerCase()}">${p.region}</span>
        <span class="tag dev-${p.device.toLowerCase()}">${p.device}</span>
    </div>`;
}

async function load() {
    const r = await fetch(`${DATA_PATH}rankings.json?v=${Date.now()}`);
    DATA = await r.json();
    calculateOverall();
    buildKitBar();
    render("Overall");
}

function calculateOverall() {
    let totals = {};
    const PTS = { "HT1":50, "LT1":40, "HT2":30, "LT2":20, "HT3":12, "LT3":8, "HT4":5, "LT4":3, "HT5":2, "LT5":1 };
    for(let k in DATA) {
        if(k!=="Overall" && k!=="Players") {
            for(let t in DATA[k]) {
                DATA[k][t].forEach(p => {
                    const cleanT = t.replace('R','');
                    totals[p] = (totals[p]||0) + (PTS[cleanT]||0);
                });
            }
        }
    }
    DATA["Overall"] = totals;
}

function buildKitBar() {
    const bar = document.getElementById('kitBar'); bar.innerHTML = "";
    Object.keys(KIT_MAP).forEach(k => {
        const btn = document.createElement('button');
        btn.className = `kit-btn ${k==='Overall'?'active':''}`;
        btn.innerHTML = (KIT_MAP[k] ? `<img src="${ASSETS}${KIT_MAP[k]}" style="width:16px; margin-right:5px;"> ` : "") + k.toUpperCase();
        btn.onclick = () => { 
            if(CURRENT_TAB === 'rankings') {
                document.querySelectorAll('.kit-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); 
                CURRENT_KIT = k; 
                render(k); 
            }
        };
        bar.appendChild(btn);
    });
}

function render(kit) {
    const out = document.getElementById('displayList'); out.innerHTML = "";
    if(kit === "Overall") {
        Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]).forEach(([name, pts], i) => {
            out.innerHTML += `
            <div class="tier-card clickable" onclick="openProfile('${name}')">
                <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
                    <div class="player-row-content">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <b style="color:var(--purple); font-size:0.8rem;">#${i+1}</b>
                            <span style="font-weight:bold;">${name}</span>
                        </div>
                        ${getTags(name)}
                    </div>
                    <b style="color:var(--gold);">${pts} PTS</b>
                </div>
            </div>`;
        });
    } else {
        // Kit Grid View logic remains similar but uses centralized tags
        renderKitGrid(kit);
    }
}

function renderKitGrid(kit) {
    const out = document.getElementById('displayList');
    const grid = document.createElement('div'); 
    grid.style.display="flex"; grid.style.gap="15px"; grid.style.flexWrap="wrap"; grid.style.justifyContent="center";
    
    ["T1","T2","T3","T4","T5"].forEach(lvl => {
        let col = `<div style="min-width:180px;"><div class="tier-header">${lvl}</div>`;
        let has = false;
        for(let t in DATA[kit]) {
            if(t.includes(lvl)) {
                DATA[kit][t].forEach(name => {
                    has = true;
                    col += `<div class="tier-card clickable" style="margin-bottom:10px; text-align:center;" onclick="openProfile('${name}')">
                        <div style="font-weight:bold; margin-bottom:5px;">${name}</div>
                        ${getTags(name, true)}
                        <div style="font-size:0.6rem; color:var(--gold); margin-top:5px;">${t}</div>
                    </div>`;
                });
            }
        }
        if(has) { col += `</div>`; grid.appendChild(Object.assign(document.createElement('div'), {innerHTML: col})); }
    });
    out.appendChild(grid);
}

function openProfile(name) {
    if(!DATA.Overall?.[name]) return;
    const sorted = Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]);
    const rankIdx = sorted.findIndex(x => x[0] === name);
    
    document.getElementById('pRank').innerText = "RANK #" + (rankIdx + 1);
    document.getElementById('pName').innerText = name;
    document.getElementById('pMeta').innerHTML = getTags(name, true);
    document.getElementById('pPoints').innerText = DATA.Overall[name] + " PTS";
    
    let grid = "";
    for(let k in DATA) {
        if(k === "Overall" || k === "Players") continue;
        for(let t in DATA[k]) {
            if(DATA[k][t].includes(name)) {
                const isR = t.startsWith('R');
                const cleanTier = isR ? t.substring(1) : t;
                grid += `
                <div class="p-kit-item">
                    <div class="kit-popup">
                        <span class="popup-kit-name">${k.toUpperCase()}</span>
                        <span class="popup-tier-name">${cleanTier}</span>
                    </div>
                    <div class="p-kit-circle"><img src="${ASSETS}${KIT_MAP[k]}"></div>
                    <div class="tier-label-under">${cleanTier}</div>
                </div>`;
            }
        }
    }
    document.getElementById('pTiers').innerHTML = grid;
    document.getElementById('profileModal').style.display = 'flex';
}

async function switchTab(tab) {
    CURRENT_TAB = tab;
    document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
    document.getElementById('nav-' + tab).classList.add('active');
    
    const out = document.getElementById('displayList');
    const label = document.getElementById('viewLabel');
    out.innerHTML = "";
    
    if(tab === 'rankings') {
        document.getElementById('kitBar').style.display="flex";
        render(CURRENT_KIT);
    } else {
        document.getElementById('kitBar').style.display="none";
        label.innerText = tab === 'hof' ? "HALL OF FAME" : "TIER TESTERS";
        out.innerHTML = `<div style="color:#555; font-family:'MultiCraftFont'; margin-top:50px;">LOADING ${label.innerText}...</div>`;
        
        // Simulating load for HOF/Testers
        setTimeout(() => {
            out.innerHTML = `<div style="color:var(--gold); font-family:'MultiCraftFont';">NO DATA FOUND FOR ${label.innerText}</div>`;
        }, 500);
    }
}

load();
</script>
</body>
</html>
